[tool.ruff]
line-length = 100
target-version = "py310"

exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
]

[tool.ruff.lint]

select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort imports
    "B",   # bugbear (important bug detection)
    "UP",  # pyupgrade
    "SIM", # simplifications
    "C4",  # comprehensions
]

ignore = [
    "E501",  # allow long lines (handled by formatter)
]

fixable = ["ALL"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = [
    "active_learning",
    "drift",
    "conformal",
    "models",
    "tasks",
    "engine",
]
combine-as-imports = true

[tool.ruff.lint.per-file-ignores]
"__init__.py" = ["F401"]  # allow re-export imports